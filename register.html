<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Crea il tuo account CinemaSupremo.">
  <title>CinemaSupremo - Registrati</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/main.css">
</head>

<body data-brand="home">

  <header>
    <nav>
      <div class="logo">
        <a href="home">CinemaSupremo</a>
      </div>
      <ul class="menu" id="mainMenu">
        <li><a href="home">Home</a></li>
        <li><a href="marvel">Marvel</a></li>
        <li><a href="dc">DC</a></li>
        <span id="authLinks"></span>
      </ul>
      <button class="hamburger" id="hamburgerBtn" aria-label="Apri menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2 id="registerHeroTitle">Crea un account</h2>
      <p id="registerHeroText">Registrati gratuitamente per accedere a tutte le funzionalità.</p>
    </section>

    <section class="form-container">
      <form id="registerForm" novalidate>
        <h2 id="registerFormTitle">Registrati</h2>

        <div id="emailPasswordSection">
          <button type="button" class="google-btn" id="googleBtn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continua con Google
          </button>

          <div class="form-divider"><span>oppure</span></div>

          <input type="email" id="email" placeholder="Email" autocomplete="email">
          <input type="password" id="password" placeholder="Password (min. 6 caratteri)" autocomplete="new-password">

          <div class="form-section-label">Il tuo profilo</div>
        </div>

        <input type="text" id="displayName" placeholder="Nome visualizzato (es. Mario Rossi)" maxlength="32">

        <div class="form-nickname-wrap">
          <span class="form-nickname-at">@</span>
          <input type="text" id="nickname" placeholder="nickname (es. mariorossi)" maxlength="24">
        </div>

        <div class="register-avatar-section">
          <p class="register-avatar-label">Scegli un avatar</p>
          <div class="register-avatar-grid" id="registerAvatarGrid"></div>
          <input type="hidden" id="selectedAvatar">
        </div>

        <button type="submit" id="submitBtn">Crea account</button>
        <p id="registerError" class="error-message" role="alert" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer>
    <div class="footer-links">
      <a href="privacy">Privacy Policy</a>
      <a href="cookies">Cookie Policy</a>
      <a href="terms">Termini di Servizio</a>
    </div>
    <div class="footer-copy">
      <span>&copy; 2025 - <span id="year"></span> CinemaSupremo &mdash; Tutti i diritti riservati</span>
    </div>
  </footer>

  <script defer src="js/menu.js"></script>
  <script defer src="js/footer.js"></script>
  <script defer src="js/cookies.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/register.js"></script>

</body>
</html>
